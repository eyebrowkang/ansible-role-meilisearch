---
name: CI
on: [push, pull_request, workflow_dispatch]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run ansible-galaxy collection install -r molecule/default/collections.yml
      - run: uv run yamllint .
      - run: uv run ansible-lint

  molecule-docker:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian12
          - ubuntu2404
    env:
      MOLECULE_DISTRO: ${{ matrix.distro }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - name: Molecule (docker)
        run: uv run molecule test
      - name: Destroy
        if: always()
        run: uv run molecule destroy

  molecule-floor:
    # Prove the role runs on its DECLARED minimum ansible-core (meta/main.yml
    # min_ansible_version), not just the dev toolchain it pins. Build a separate venv at
    # that floor and run the docker scenario. Gated to main/dispatch so it doesn't slow
    # every PR (bare `if:` — GitHub evaluates it as an expression). See docs/molecule-testing.md.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Run the docker scenario on the declared ansible-core floor
        run: |
          min="$(grep min_ansible_version meta/main.yml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          echo "Declared floor: ansible-core==${min}"
          # Pin the venv to Python 3.12: ansible-core floors below 2.18 don't run on the repo's
          # default Python 3.13, and 3.12 is compatible with every floor 2.16-2.19. (The floor
          # itself must be >= the docker harness's requirement — community.docker 5.x needs 2.17.)
          uv venv .venv-floor --python 3.12
          uv pip install -p .venv-floor "ansible-core==${min}" "molecule>=26,<27" "docker>=7"
          # molecule shells out to ansible-config/ansible-galaxy, so the floor venv must be on PATH.
          export PATH="$PWD/.venv-floor/bin:$PATH"
          ansible --version | head -1
          molecule test
      - name: Destroy
        if: always()
        run: |
          export PATH="$PWD/.venv-floor/bin:$PATH"
          molecule destroy || true
