---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install ansible-core ansible-lint yamllint

      - name: Run yamllint
        run: yamllint .

      - name: Run ansible-lint
        run: ansible-lint

  molecule:
    name: Molecule container smoke test
    runs-on: ubuntu-latest
    steps:
      # The directory name must match the role name so ANSIBLE_ROLES_PATH resolves it
      - name: Check out the codebase
        uses: actions/checkout@v4
        with:
          path: eyebrowkang.meilisearch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install ansible-core molecule "molecule-plugins[docker]" docker requests

      - name: Install required collections
        run: ansible-galaxy collection install community.docker

      - name: Run molecule ci scenario
        run: molecule test -s ci
        working-directory: eyebrowkang.meilisearch
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
