---
name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run ansible-galaxy collection install -r molecule/default/collections.yml
      - run: uv run yamllint .
      - run: uv run ansible-lint

  molecule-docker:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian12
          - ubuntu2404
          - rockylinux9
    env:
      MOLECULE_DISTRO: ${{ matrix.distro }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - name: Molecule (docker)
        run: uv run molecule test
      - name: Destroy
        if: always()
        run: uv run molecule destroy
