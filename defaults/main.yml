---
meilisearch_version: "v1.33.1"
meilisearch_user: "meilisearch"
meilisearch_group: "meilisearch"
meilisearch_home: "/var/lib/meilisearch"
meilisearch_config_dir: "/etc/meilisearch"

meilisearch_db_path: "{{ meilisearch_home }}/data"
meilisearch_env: "production"
meilisearch_http_addr: "localhost:7700"
# meilisearch_master_key: "YOUR_MASTER_KEY_HERE_CHANGE_IN_PRODUCTION_AND_SHOULD_USE_VAULT"
meilisearch_no_analytics: true
meilisearch_dump_dir: "{{ meilisearch_home }}/dumps"
meilisearch_snapshot_dir: "{{ meilisearch_home }}/snapshots"
meilisearch_schedule_snapshot: false

meilisearch_upgrade: ""
meilisearch_checksum: ""
meilisearch_upgrade_snapshot_timeout_retries: 60
meilisearch_upgrade_snapshot_poll_interval: 10
meilisearch_config_template: "meilisearch.toml.j2"
meilisearch_env_variables: {}
meilisearch_import_health_retries: 30
meilisearch_import_health_delay: 10
