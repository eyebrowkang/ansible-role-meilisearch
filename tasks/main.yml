---
- name: Validate meilisearch_env value
  ansible.builtin.assert:
    that:
      - meilisearch_env in ["production", "development"]
    fail_msg: "meilisearch_env must be 'production' or 'development' (got '{{ meilisearch_env }}')"

- name: Validate master key is defined for production
  ansible.builtin.assert:
    that:
      - meilisearch_master_key is defined
    fail_msg: "meilisearch_master_key must be defined when meilisearch_env is 'production'"
  when: meilisearch_env == "production"

- name: Setup
  ansible.builtin.include_tasks: setup.yml

- name: Upgrade
  ansible.builtin.include_tasks: upgrade.yml
  when: meilisearch_upgrade == "dumpless"

- name: Install
  ansible.builtin.include_tasks: install.yml
  when: meilisearch_upgrade == ""

- name: Configure
  ansible.builtin.include_tasks: configure.yml

- name: Service
  ansible.builtin.include_tasks: service.yml
