---
- name: Get current installed Meilisearch version
  ansible.builtin.command:
    cmd: "{{ meilisearch_binary_path }} --version"
  register: _meilisearch_current_version_output
  changed_when: false
  failed_when: false

- name: Parse current version
  ansible.builtin.set_fact:
    _meilisearch_current_version: >-
      v{{ _meilisearch_current_version_output.stdout | regex_search('(\d+\.\d+\.\d+)') }}
  when: _meilisearch_current_version_output.rc == 0

- name: Display version information
  ansible.builtin.debug:
    msg: "Current: {{ _meilisearch_current_version | default('not installed') }} -> Target: {{ meilisearch_version }}"

- name: Set fresh install fact (binary not found)
  ansible.builtin.set_fact:
    _meilisearch_fresh_install: true
  when: _meilisearch_current_version_output.rc != 0

- name: Set upgrade needed fact (version comparison)
  when: _meilisearch_current_version_output.rc == 0
  block:
    - name: Fail if downgrade attempted
      ansible.builtin.fail:
        msg: >-
          Downgrade not supported: current version {{ _meilisearch_current_version }}
          is newer than target version {{ meilisearch_version }}
      when: _meilisearch_current_version is version(meilisearch_version, '>')

    - name: Parse major versions
      ansible.builtin.set_fact:
        _meilisearch_current_major: "{{ _meilisearch_current_version | regex_replace('^v(\\d+).*$', '\\1') | int }}"
        _meilisearch_target_major: "{{ meilisearch_version | regex_replace('^v(\\d+).*$', '\\1') | int }}"

    # Dumps are Meilisearch's supported cross-version mechanism, so a major-version
    # bump must go through the dump path. The in-place dumpless migration is not
    # guaranteed across majors, so refuse it with a pointer to the dump path.
    - name: Fail on dumpless major-version upgrade
      ansible.builtin.fail:
        msg: >-
          Dumpless upgrade across major versions is not supported
          (current {{ _meilisearch_current_version }} -> target {{ meilisearch_version }}).
          Use a dump-based upgrade (meilisearch_upgrade=dump) to cross major
          versions, or follow the official Meilisearch upgrade guide.
      when:
        - meilisearch_upgrade == "dumpless"
        - _meilisearch_current_major | int < _meilisearch_target_major | int

    - name: Set upgrade needed when versions differ
      ansible.builtin.set_fact:
        _meilisearch_upgrade_needed: "{{ _meilisearch_current_version is version(meilisearch_version, '<') }}"
