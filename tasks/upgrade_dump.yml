---
- name: Check current Meilisearch service is running
  ansible.builtin.systemd_service:
    name: meilisearch
  register: meilisearch_service_status

- name: Assert Meilisearch service is active
  ansible.builtin.assert:
    that:
      - meilisearch_service_status.status.ActiveState == "active"
    fail_msg: "Meilisearch service must be running before dump upgrade (current state: {{ meilisearch_service_status.status.ActiveState }})"

- name: Create dump via API
  ansible.builtin.uri:
    url: "{{ _meilisearch_api_base_url }}/dumps"
    method: POST
    headers: "{{ {'Authorization': 'Bearer ' + meilisearch_master_key} if meilisearch_master_key | default('') | length > 0 else omit }}"
    status_code: 202
    return_content: true
  register: dump_response

- name: Print dump task info
  ansible.builtin.debug:
    msg: "Dump task UID: {{ dump_response.json.taskUid }}"

- name: Poll dump task until completion
  ansible.builtin.uri:
    url: "{{ _meilisearch_api_base_url }}/tasks/{{ dump_response.json.taskUid }}"
    method: GET
    headers: "{{ {'Authorization': 'Bearer ' + meilisearch_master_key} if meilisearch_master_key | default('') | length > 0 else omit }}"
    return_content: true
  register: dump_task_status
  until: dump_task_status.json.status == "succeeded" or dump_task_status.json.status == "failed"
  retries: "{{ meilisearch_upgrade_snapshot_timeout_retries }}"
  delay: "{{ meilisearch_upgrade_snapshot_poll_interval }}"

- name: Assert dump succeeded
  ansible.builtin.assert:
    that:
      - dump_task_status.json.status == "succeeded"
    fail_msg: "Dump task failed: {{ dump_task_status.json | to_json }}"
    success_msg: "Dump created successfully"

- name: Extract dump UID
  ansible.builtin.set_fact:
    _meilisearch_dump_uid: "{{ dump_task_status.json.details.dumpUid }}"

- name: Print dump UID
  ansible.builtin.debug:
    msg: "Dump UID: {{ _meilisearch_dump_uid }}"

- name: Stop Meilisearch service
  ansible.builtin.systemd_service:
    name: meilisearch
    state: stopped

- name: Check data directory exists
  ansible.builtin.stat:
    path: "{{ meilisearch_db_path }}"
  register: _meilisearch_db_path_stat

- name: Check data directory contents
  ansible.builtin.find:
    paths: "{{ meilisearch_db_path }}"
    file_type: any
    hidden: true
    recurse: false
  register: _meilisearch_db_contents
  when: _meilisearch_db_path_stat.stat.exists

- name: Backup data directory
  ansible.builtin.command:
    cmd: "mv {{ meilisearch_db_path }} {{ meilisearch_db_path }}.bak.{{ ansible_facts.date_time.iso8601_basic_short }}"
  changed_when: true
  when:
    - _meilisearch_db_path_stat.stat.exists
    - (_meilisearch_db_contents.matched | default(0) | int) > 0

- name: Re-create empty data directory
  ansible.builtin.file:
    path: "{{ meilisearch_db_path }}"
    state: directory
    owner: "{{ meilisearch_user }}"
    group: "{{ meilisearch_group }}"
    mode: '0755'

- name: Compute binary facts
  ansible.builtin.include_tasks: binary_facts.yml

- name: Download new Meilisearch binary
  ansible.builtin.get_url:
    url: "https://github.com/meilisearch/meilisearch/releases/download/{{ meilisearch_version }}/meilisearch-linux-{{ meilisearch_arch }}"
    dest: "{{ meilisearch_binary_path }}"
    checksum: "{{ _meilisearch_effective_checksum | default(omit, true) }}"
    mode: '0755'
    owner: root
    group: root
    force: true
    timeout: 120
  retries: 3
  delay: 10

- name: Import dump into new version
  ansible.builtin.command:
    cmd: >-
      {{ meilisearch_binary_path }}
      --config-file-path {{ meilisearch_config_dir }}/meilisearch.toml
      --import-dump {{ meilisearch_dump_dir }}/{{ _meilisearch_dump_uid }}.dump
  become: true
  become_user: "{{ meilisearch_user }}"
  async: 1800
  poll: 0
  register: _meilisearch_import_job
  changed_when: true

- name: Wait for dump import to become healthy
  block:
    - name: Wait for Meilisearch health endpoint after import
      ansible.builtin.uri:
        url: "{{ _meilisearch_health_url }}"
        method: GET
        return_content: true
        status_code: 200
      register: _meilisearch_import_health
      retries: "{{ meilisearch_import_health_retries }}"
      delay: "{{ meilisearch_import_health_delay }}"
      until: _meilisearch_import_health.status == 200
  rescue:
    - name: Check import job result
      ansible.builtin.async_status:
        jid: "{{ _meilisearch_import_job.ansible_job_id }}"
      become: true
      become_user: "{{ meilisearch_user }}"
      register: _meilisearch_import_result
      failed_when: false

    - name: Fail with import job details
      ansible.builtin.fail:
        msg: >-
          Dump import did not become healthy in time
          (job finished: {{ _meilisearch_import_result.finished | default('unknown') }},
          rc: {{ _meilisearch_import_result.rc | default('n/a') }}).
          Stderr: {{ _meilisearch_import_result.stderr | default('') | trim }}

- name: Clean up import async job
  ansible.builtin.async_status:
    jid: "{{ _meilisearch_import_job.ansible_job_id }}"
    mode: cleanup
  become: true
  become_user: "{{ meilisearch_user }}"
  failed_when: false

- name: Ensure Meilisearch process from import is stopped
  ansible.builtin.command:
    cmd: "pkill -f '{{ meilisearch_binary_path }} --config-file-path'"
  failed_when: false
  changed_when: true

- name: Wait for import process to exit
  ansible.builtin.command:
    cmd: "pgrep -f '{{ meilisearch_binary_path }} --config-file-path'"
  register: _meilisearch_import_pgrep
  failed_when: false
  changed_when: false
  retries: 30
  delay: 2
  until: _meilisearch_import_pgrep.rc != 0
