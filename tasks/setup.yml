---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  changed_when: false
  when: ansible_pkg_mgr == "apt"

- name: Install acl package (required for become_user)
  ansible.builtin.package:
    name: acl
    state: present

- name: Create meilisearch group
  ansible.builtin.group:
    name: "{{ meilisearch_group }}"
    system: true
    state: present

- name: Create meilisearch user
  ansible.builtin.user:
    name: "{{ meilisearch_user }}"
    group: "{{ meilisearch_group }}"
    system: true
    create_home: true
    home: "{{ meilisearch_home }}"
    shell: /sbin/nologin
    state: present

- name: Create required directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ meilisearch_user }}"
    group: "{{ meilisearch_group }}"
    mode: '0755'
  loop:
    - "{{ meilisearch_config_dir }}"
    - "{{ meilisearch_db_path }}"
    - "{{ meilisearch_dump_dir }}"
    - "{{ meilisearch_snapshot_dir }}"
