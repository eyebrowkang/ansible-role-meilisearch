---
dependency:
  name: galaxy

driver:
  name: default
  options:
    managed: true

platforms:
  - name: meilisearch-http-addr
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-debian12}-ansible:latest"
    systemd: true
    groups:
      - meilisearch_servers

provisioner:
  name: ansible
  playbooks:
    create: ../default/create.yml
    destroy: ../default/destroy.yml
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible

scenario:
  name: http_addr
  test_sequence:
    - dependency
    - destroy
    - create
    - converge
    - idempotence
    - verify
    - destroy
