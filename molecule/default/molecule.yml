---
driver:
  name: vagrant
  provider:
    name: libvirt

platforms:
  - name: meilisearch-debian12
    box: generic/debian12
    cpus: 1
    memory: 2048

provisioner:
  name: ansible
  lint: ansible-lint
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."

verifier:
  name: ansible
